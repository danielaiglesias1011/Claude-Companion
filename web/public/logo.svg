<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Pixel cat — Companion logo -->

  <!-- Left ear -->
  <rect x="2" y="0" width="1" height="1" fill="#d44b7a"/>
  <rect x="1" y="1" width="3" height="2" fill="#d44b7a"/>
  <!-- Inner left ear -->
  <rect x="2" y="1" width="1" height="1" fill="#f0a0bc"/>

  <!-- Right ear -->
  <rect x="11" y="0" width="1" height="1" fill="#d44b7a"/>
  <rect x="10" y="1" width="3" height="2" fill="#d44b7a"/>
  <!-- Inner right ear -->
  <rect x="11" y="1" width="1" height="1" fill="#f0a0bc"/>

  <!-- Head -->
  <rect x="1" y="2" width="12" height="11" fill="#d44b7a"/>

  <!-- Left eye white -->
  <rect x="2" y="5" width="3" height="3" fill="#fff8fa"/>
  <!-- Left pupil (vertical slit) -->
  <rect x="3" y="5" width="1" height="3" fill="#2d1a20"/>
  <!-- Left eye shine -->
  <rect x="2" y="5" width="1" height="1" fill="#ffffff"/>

  <!-- Right eye white -->
  <rect x="9" y="5" width="3" height="3" fill="#fff8fa"/>
  <!-- Right pupil (vertical slit) -->
  <rect x="10" y="5" width="1" height="3" fill="#2d1a20"/>
  <!-- Right eye shine -->
  <rect x="9" y="5" width="1" height="1" fill="#ffffff"/>

  <!-- Nose -->
  <rect x="6" y="9" width="2" height="1" fill="#f0b0c8"/>
  <rect x="7" y="10" width="1" height="1" fill="#f0b0c8"/>

  <!-- Mouth -->
  <rect x="5" y="11" width="1" height="1" fill="#b83868"/>
  <rect x="8" y="11" width="1" height="1" fill="#b83868"/>
</svg>
